name: Validate PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed commit types (must match the types used in .releaserc.json)
          types: |
            feat
            fix
            perf
            refactor
            docs
            style
            test
            build
            ci
            chore
            revert
          # Allow scopes (optional)
          requireScope: false
          # Validate that the subject is not empty
          subjectPattern: ^.+$
          subjectPatternError: |
            The PR title subject must not be empty.
          # Disallow wip
          wip: false
