name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read   # needed by action-semantic-pull-request

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  semantic-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types as defined by the Conventional Commits spec.
          # The type determines the semver bump in the Docker publish workflow:
          #   feat  → minor bump
          #   fix / perf / refactor / ... → patch bump
          #   feat! or BREAKING CHANGE → major bump
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
